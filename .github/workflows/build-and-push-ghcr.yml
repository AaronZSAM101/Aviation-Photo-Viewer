name: Build and Push Multi-Arch Image (Native Speed)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aviation-photo-viewer

jobs:
  meta:
    name: Generate build metadata
    runs-on: ubuntu-24.04
    outputs:
      datetime_tag: ${{ steps.meta.outputs.datetime_tag }}
    steps:
      - name: Generate datetime tag
        id: meta
        shell: bash
        run: echo "datetime_tag=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: meta
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04  # 标准的 x86 运行器
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm  # 原生的 ARM64 运行器 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            echo "arch_tags=${image}:${GITHUB_REF_NAME}-${{ matrix.arch }},${image}:${version}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          else
            datetime_tag="${{ needs.meta.outputs.datetime_tag }}"
            echo "arch_tags=${image}:${datetime_tag}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.tags.outputs.arch_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    name: Create multi-arch tags
    runs-on: ubuntu-24.04
    needs: [meta, build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest tags
        shell: bash
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            docker buildx imagetools create \
              -t "${image}:${GITHUB_REF_NAME}" \
              -t "${image}:${version}" \
              "${image}:${GITHUB_REF_NAME}-amd64" \
              "${image}:${GITHUB_REF_NAME}-arm64"
          else
            datetime_tag="${{ needs.meta.outputs.datetime_tag }}"
            docker buildx imagetools create \
              -t "${image}:latest" \
              -t "${image}:${datetime_tag}" \
              "${image}:${datetime_tag}-amd64" \
              "${image}:${datetime_tag}-arm64"
          fi
