name: Build and Push Multi-Arch Image (Native Speed)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04  # 标准的 x86 运行器
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm  # 原生的 ARM64 运行器 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Per-branch/tag SHA with arch suffix (e.g. sha-abc123-amd64)
            type=sha,format=short,prefix=sha-,suffix=-${{ matrix.arch }}
            # When pushing a git tag (vX.Y.Z) create versioned arch tags (e.g. v1.2.3-amd64)
            type=ref,event=tag,suffix=-${{ matrix.arch }}
            # Keep branch-specific arch tags for branch pushes (e.g. main-amd64)
            type=ref,event=branch,suffix=-${{ matrix.arch }}
            # Also publish stable per-arch latest tags we will aggregate (e.g. latest-amd64)
            type=raw,value=latest-${{ matrix.arch }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-latest:
    name: Publish latest image
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push latest manifest
        run: |
          set -euo pipefail
          REGISTRY=${{ env.REGISTRY }}
          IMAGE=${{ env.IMAGE_NAME }}

          # Always create multi-arch latest
          docker buildx imagetools create -t ${REGISTRY}/${IMAGE}:latest \
            ${REGISTRY}/${IMAGE}:latest-amd64 \
            ${REGISTRY}/${IMAGE}:latest-arm64

          # If this workflow was triggered by pushing a git tag, also create a versioned manifest
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            docker buildx imagetools create -t ${REGISTRY}/${IMAGE}:${TAG_NAME} \
              ${REGISTRY}/${IMAGE}:${TAG_NAME}-amd64 \
              ${REGISTRY}/${IMAGE}:${TAG_NAME}-arm64 || true
          fi
